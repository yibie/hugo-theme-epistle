baseURL = 'https://yibie.github.io/hugo-theme-epistle/'
languageCode = 'zh-cn'
title = 'Epistle'
theme = 'hugo-theme-epistle'
themesDir = '../..'
summaryLength = 0
disableKinds = ['taxonomy', 'term']

# 允许 Markdown 中写原生 HTML（heti 行内标签需要）
[markup.goldmark.renderer]
  unsafe = true

# 允许 Markdown 块级元素附加 CSS 类
[markup.goldmark.parser.attribute]
  block = true
  title = true

[params]
  author = '署名者'
  description = '一个书信风格的个人博客'
  mainSections = ['posts']
  letterStyle = 'default'
  valediction = '此致'
  showSignature = true
  dappledLight = true
  # 社交分享默认封面图（Telegram / Twitter 预览用）
  # ogImage = 'https://yourdomain.com/images/og-default.jpg'
